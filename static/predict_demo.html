<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Stream - POS System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .status {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            background: #ef4444;
        }
        
        .status-dot.connected {
            background: #10b981;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .content {
            padding: 30px;
        }
        
        .bill {
            background: #f8f9fa;
            border: 2px dashed #dee2e6;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            min-height: 200px;
        }
        
        .bill-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #dee2e6;
        }
        
        .bill-header h2 {
            font-size: 20px;
            color: #333;
        }
        
        .bill-header .time {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .items-list {
            margin: 20px 0;
        }
        
        .item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e9ecef;
        }
        
        .item:last-child {
            border-bottom: none;
        }
        
        .item-name {
            font-weight: 600;
            color: #495057;
        }
        
        .item-qty {
            color: #6c757d;
            margin-left: 10px;
        }
        
        .item-price {
            font-weight: 600;
            color: #667eea;
        }
        
        .bill-total {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .bill-total .label {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }
        
        .bill-total .amount {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }
        
        .empty-state {
            text-align: center;
            color: #adb5bd;
            padding: 40px 20px;
        }
        
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        button.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        button.secondary {
            background: #e9ecef;
            color: #495057;
        }
        
        button.secondary:hover {
            background: #dee2e6;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .settings {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .settings label {
            display: block;
            font-size: 14px;
            color: #495057;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .settings input, .settings select {
            width: 100%;
            padding: 10px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .log {
            background: #212529;
            color: #adb5bd;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .log-entry {
            margin-bottom: 5px;
        }
        
        .log-time {
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍽️ Prediction Stream - POS System</h1>
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Disconnected</span>
            </div>
        </div>
        
        <div class="content">
            <div class="settings">
                <label>Camera ID</label>
                <input type="number" id="cameraId" value="0" min="0">
                
                <label>Detection Interval (seconds)</label>
                <input type="number" id="interval" value="2" min="0.5" max="10" step="0.5">
                
                <label>Confidence Threshold</label>
                <input type="range" id="conf" min="0" max="100" value="25">
                <span id="confValue">25%</span>
            </div>
            
            <div class="controls">
                <button class="primary" id="startBtn" onclick="startStream()">▶️ Start Stream</button>
                <button class="secondary" id="stopBtn" onclick="stopStream()" disabled>⏹️ Stop Stream</button>
            </div>
            
            <div class="bill">
                <div class="bill-header">
                    <h2>Current Bill</h2>
                    <div class="time" id="timestamp">--</div>
                </div>
                
                <div id="billContent">
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                        </svg>
                        <div>Waiting for detection...</div>
                    </div>
                </div>
            </div>
            
            <div class="log" id="log">
                <div class="log-entry">
                    <span class="log-time">[00:00:00]</span> System ready
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let ws = null;
        
        function addLog(message) {
            const log = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span> ${message}`;
            log.insertBefore(entry, log.firstChild);
            
            // Keep only last 50 entries
            while (log.children.length > 50) {
                log.removeChild(log.lastChild);
            }
        }
        
        function updateStatus(connected) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            if (connected) {
                statusDot.classList.add('connected');
                statusText.textContent = 'Connected';
            } else {
                statusDot.classList.remove('connected');
                statusText.textContent = 'Disconnected';
            }
        }
        
        function formatPrice(price) {
            return price.toLocaleString('vi-VN') + 'đ';
        }
        
        function updateBill(data) {
            const billContent = document.getElementById('billContent');
            const timestamp = document.getElementById('timestamp');
            
            timestamp.textContent = data.timestamp;
            
            if (data.items.length === 0) {
                billContent.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                        </svg>
                        <div>No items detected</div>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="items-list">';
            data.items.forEach(item => {
                html += `
                    <div class="item">
                        <div>
                            <span class="item-name">${item.name}</span>
                            <span class="item-qty">× ${item.qty}</span>
                        </div>
                        <div class="item-price">${formatPrice(item.price * item.qty)}</div>
                    </div>
                `;
            });
            html += '</div>';
            
            html += `
                <div class="bill-total">
                    <div class="label">TOTAL</div>
                    <div class="amount">${formatPrice(data.total_price)}</div>
                </div>
            `;
            
            billContent.innerHTML = html;
        }
        
        function startStream() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                addLog('Stream already running');
                return;
            }
            
            const cameraId = document.getElementById('cameraId').value;
            const interval = document.getElementById('interval').value;
            const conf = document.getElementById('conf').value / 100;
            
            const wsUrl = `ws://localhost:8000/api/v1/predict/stream?camera_id=${cameraId}&interval=${interval}&conf=${conf}`;
            
            addLog(`Connecting to ${wsUrl}...`);
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                updateStatus(true);
                addLog('✓ Connected to prediction stream');
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
            };
            
            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                
                if (message.type === 'prediction') {
                    updateBill(message);
                    addLog(`📋 Bill updated: ${message.items.length} items, Total: ${message.total_price}đ`);
                } else if (message.type === 'text') {
                    addLog(message.data);
                } else if (message.type === 'error') {
                    addLog(`❌ ${message.data}`);
                }
            };
            
            ws.onerror = (error) => {
                addLog('❌ WebSocket error');
                console.error('WebSocket error:', error);
            };
            
            ws.onclose = () => {
                updateStatus(false);
                addLog('✗ Disconnected');
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
            };
        }
        
        function stopStream() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }
        
        // Update confidence display
        document.getElementById('conf').addEventListener('input', (e) => {
            document.getElementById('confValue').textContent = e.target.value + '%';
        });
    </script>
</body>
</html>
